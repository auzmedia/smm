    <style>
        /* ============ CSS Variables (Themes) ============ */
        :root {
            /* Light Theme (Default) */
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.75);

            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-primary: #0d9488;
            --accent-primary-hover: #0f766e;
            --accent-secondary: #f59e0b;
            --accent-gradient: linear-gradient(135deg, #0d9488, #14b8a6);
            --border-color: rgba(226, 232, 240, 0.8);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 10px 15px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 25px 50px rgba(0, 0, 0, 0.12);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.08);
            --hero-overlay: linear-gradient(135deg, rgba(13, 148, 136, 0.85), rgba(20, 184, 166, 0.7));
            --card-bg: #ffffff;
            --input-bg: #f1f5f9;
            --input-border: #e2e8f0;
            --tag-bg: #f0fdfa;
            --tag-text: #0d9488;
            --star-color: #f59e0b;
            --footer-bg: #0f172a;
            --footer-text: #cbd5e1;
            --footer-heading: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-glass: rgba(30, 41, 59, 0.75);
            --bg-glass-hover: rgba(30, 41, 59, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent-primary: #14b8a6;

            --accent-secondary: #fbbf24;
            --accent-gradient: linear-gradient(135deg, #14b8a6, #2dd4bf);
            --border-color: rgba(51, 65, 85, 0.8);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.3), 0 10px 15px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 25px 50px rgba(0, 0, 0, 0.5);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
            --hero-overlay: linear-gradient(135deg, rgba(15, 118, 110, 0.9), rgba(13, 148, 136, 0.8));
            --card-bg: #1e293b;
            --input-bg: #334155;
            --input-border: #475569;
            --tag-bg: rgba(20, 184, 166, 0.15);
            --tag-text: #2dd4bf;
            --star-color: #fbbf24;
            --footer-bg: #020617;
            --footer-text: #94a3b8;
            --footer-heading: #f1f5f9;
        }

        /* ============ Reset & Base ============ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ============ Utility Classes ============ */
        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            text-align: center;
            margin-bottom: 16px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto 48px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(13, 148, 136, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(13, 148, 136, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
        }

        .btn-outline:hover {
            background: #ffffff;
            color: var(--accent-primary);
        }

        /* ============ Theme Toggle ============ */
        .theme-toggle {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-xl);
        }

        /* ============ Language Switcher ============ */
        .lang-switcher {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            border: 1.5px solid var(--border-color);
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .lang-btn.active {
            background: var(--accent-primary);
            color: #ffffff;
            border-color: var(--accent-primary);
        }

        .lang-btn:hover:not(.active) {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* ============ Header / Navigation ============ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 16px 0;
            transition: var(--transition);
        }

        .header.scrolled {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 10px 0;
        }

        .header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            font-weight: 500;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            transition: var(--transition);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gradient);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* ============ Hero Section ============ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: var(--hero-overlay), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23f0fdfa" width="1200" height="800"/><circle cx="200" cy="150" r="80" fill="%23ccfbf1" opacity="0.6"/><circle cx="950" cy="600" r="120" fill="%23ccfbf1" opacity="0.5"/><circle cx="600" cy="400" r="200" fill="%23f0fdfa" opacity="0.4"/></svg>');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 120px 0 80px;
        }

        [data-theme="dark"] .hero {
            background: var(--hero-overlay), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%230f172a" width="1200" height="800"/><circle cx="200" cy="150" r="80" fill="%231e293b" opacity="0.6"/><circle cx="950" cy="600" r="120" fill="%231e293b" opacity="0.5"/><circle cx="600" cy="400" r="200" fill="%231e293b" opacity="0.4"/></svg>');
        }

        .hero-content {
            max-width: 650px;
            color: #ffffff;
            animation: fadeInUp 0.8s ease;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            margin-bottom: 36px;
            opacity: 0.95;
            line-height: 1.7;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ============ Advantages ============ */
        .advantages {
            padding: 100px 0;
            background: var(--bg-secondary);
            transition: background-color 0.4s ease;
        }

        .advantages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 28px;
